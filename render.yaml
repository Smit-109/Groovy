services:
  - type: web
    name: edupath-api
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edupath-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.0
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: edupath-db
    plan: free
    databaseName: edupath
